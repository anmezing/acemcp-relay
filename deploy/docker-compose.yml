services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-lce_relay}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  lce:
    build: ../../lce
    restart: unless-stopped
    volumes:
      - lce_data:/data
    environment:
      LCE_HOME: /data
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-}
      EMBEDDINGS_MODEL: ${EMBEDDINGS_MODEL:-}
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-}
      EMBEDDINGS_API_KEY: ${EMBEDDINGS_API_KEY:-}
      RERANK_PROVIDER: ${RERANK_PROVIDER:-}
      RERANK_MODEL: ${RERANK_MODEL:-}
      RERANK_BASE_URL: ${RERANK_BASE_URL:-}
      RERANK_API_KEY: ${RERANK_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/mcp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',id:1,method:'initialize',params:{protocolVersion:'2025-03-26',capabilities:{},clientInfo:{name:'healthcheck',version:'1.0.0'}}})}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  relay:
    build: ../
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      lce:
        condition: service_healthy
    environment:
      SERVER_ADDR: "0.0.0.0:3009"
      LCE_MCP_URL: http://lce:3000/mcp
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-lce_relay}
      REDIS_PORT: "6379"
      API_KEY_CACHE_TTL: ${API_KEY_CACHE_TTL:-30m}

  frontend:
    build: ../../acemcp-relay-frontend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: "3001"
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://513689.xyz}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET in .env}
      AUTH_LINUXDO_ID: ${AUTH_LINUXDO_ID:-}
      AUTH_LINUXDO_SECRET: ${AUTH_LINUXDO_SECRET:-}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      AUTH_GITHUB_MIN_ACCOUNT_AGE_DAYS: ${AUTH_GITHUB_MIN_ACCOUNT_AGE_DAYS:-365}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lce_relay}
      REDIS_HOST: redis
      REDIS_PORT: "6379"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${SSL_CERT_PATH:-./certs}:/etc/nginx/certs:ro
    depends_on:
      - relay
      - frontend

volumes:
  pgdata:
  lce_data:

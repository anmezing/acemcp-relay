services:
  lce:
    build: ../../lce
    restart: unless-stopped
    volumes:
      - lce_data:/data
    environment:
      LCE_HOME: /data
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-}
      EMBEDDINGS_MODEL: ${EMBEDDINGS_MODEL:-}
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-}
      EMBEDDINGS_API_KEY: ${EMBEDDINGS_API_KEY:-}
      RERANK_PROVIDER: ${RERANK_PROVIDER:-}
      RERANK_MODEL: ${RERANK_MODEL:-}
      RERANK_BASE_URL: ${RERANK_BASE_URL:-}
      RERANK_API_KEY: ${RERANK_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/mcp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',id:1,method:'initialize',params:{protocolVersion:'2025-03-26',capabilities:{},clientInfo:{name:'healthcheck',version:'1.0.0'}}})}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  relay:
    build: ../
    restart: unless-stopped
    ports:
      - "127.0.0.1:3009:3009"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      lce:
        condition: service_healthy
    environment:
      SERVER_ADDR: "0.0.0.0:3009"
      LCE_MCP_URL: http://lce:3000/mcp
      DB_HOST: host.docker.internal
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-acemcp}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-acemcp_relay}
      REDIS_HOST: host.docker.internal
      REDIS_PORT: "6379"
      API_KEY_CACHE_TTL: ${API_KEY_CACHE_TTL:-30m}

  frontend:
    build: ../../acemcp-relay-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "3001"
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://513689.xyz}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET in .env}
      AUTH_LINUXDO_ID: ${AUTH_LINUXDO_ID:-}
      AUTH_LINUXDO_SECRET: ${AUTH_LINUXDO_SECRET:-}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      AUTH_GITHUB_MIN_ACCOUNT_AGE_DAYS: ${AUTH_GITHUB_MIN_ACCOUNT_AGE_DAYS:-365}
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-acemcp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-acemcp_relay}
      REDIS_HOST: host.docker.internal
      REDIS_PORT: "6379"

volumes:
  lce_data:
